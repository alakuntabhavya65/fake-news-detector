
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- LOGO -->

        <div class="auth-logo">
            🚀
        </div>

        <!-- TITLE -->

        <h1>
            Create Account
        </h1>

        <p class="auth-subtitle">
            Join the AI-powered misinformation detection platform
        </p>

        <!-- FORM -->

        <form method="POST"
              class="auth-form">

            <div class="input-group">

                <label>
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Choose a username"
                    required
                >

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Create a secure password"
                    required
                >

            </div>

            <button type="submit"
                    class="btn primary auth-btn">

                Create Account

            </button>

        </form>

        <!-- FOOTER -->

        <div class="auth-footer">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </div>

    </div>

</div>

</body>

</html>
