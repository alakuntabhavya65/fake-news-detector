
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- LOGO -->

        <div class="auth-logo">
            🛡
        </div>

        <!-- TITLE -->

        <h1>
            Welcome Back
        </h1>

        <p class="auth-subtitle">
            Login to access AI analytics & detection history
        </p>

        <!-- FORM -->

        <form method="POST"
              class="auth-form">

            <div class="input-group">

                <label>
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    required
                >

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >

            </div>

            <button type="submit"
                    class="btn primary auth-btn">

                Login

            </button>

        </form>

        <!-- FOOTER -->

        <div class="auth-footer">

            Don't have an account?

            <a href="/signup">
                Create Account
            </a>

        </div>

    </div>

</div>

</body>

</html>
